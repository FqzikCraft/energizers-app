<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Энерджайзеры</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=25c3cc9b-776d-4fac-a6c1-753874b63e20&lang=ru_RU"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fontsource.roboto/files/roboto-cyrillic-400-normal.woff2');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #3C63F2;
            --primary-dark: #2B4CC2;
            --accent: #FC3F1D;
            --bg: #1A1A2E;
            --bg-card: #22223A;
            --bg-input: #2A2A45;
            --text: #FFFFFF;
            --text-secondary: #8B8BA7;
            --border: #333355;
            --success: #4CAF50;
            --radius: 16px;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            background: var(--bg-card);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            min-height: 56px;
        }

        .app-logo {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0;
        }

        .app-title {
            font-size: 20px;
            font-weight: 700;
        }

        .app-subtitle {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .tabs {
            display: flex;
            gap: 4px;
            padding: 8px 16px;
            background: var(--bg);
            position: sticky;
            top: 56px;
            z-index: 999;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: 'Roboto', sans-serif;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(60, 99, 242, 0.4);
        }

        .tab-btn svg {
            width: 18px;
            height: 18px;
        }

        .content-area {
            flex: 1;
            padding: 16px;
            padding-bottom: 200px;
            overflow-y: auto;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-card);
            position: relative;
            overflow: hidden;
        }

        .upload-zone:active {
            border-color: var(--primary);
            background: rgba(60, 99, 242, 0.1);
        }

        .upload-zone.has-image {
            padding: 8px;
            border-style: solid;
            border-color: var(--primary);
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 12px;
            background: rgba(60, 99, 242, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-icon svg {
            width: 28px;
            height: 28px;
            color: var(--primary);
        }

        .upload-text {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .upload-hint {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .upload-preview {
            width: 100%;
            border-radius: 12px;
            display: none;
            max-height: 200px;
            object-fit: cover;
        }

        .upload-zone.has-image .upload-preview {
            display: block;
        }

        .upload-zone.has-image .upload-icon,
        .upload-zone.has-image .upload-text,
        .upload-zone.has-image .upload-hint {
            display: none;
        }

        .remove-image-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .upload-zone.has-image .remove-image-btn {
            display: flex;
        }

        .ocr-progress {
            margin-top: 16px;
            display: none;
        }

        .ocr-progress.visible {
            display: block;
        }

        .progress-bar-bg {
            height: 6px;
            background: var(--bg-input);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 3px;
            transition: width 0.3s;
            width: 0%;
        }

        .progress-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
            text-align: center;
        }

        .manual-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .manual-input {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text);
            font-size: 15px;
            font-family: 'Roboto', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .manual-input:focus {
            border-color: var(--primary);
        }

        .manual-input::placeholder {
            color: var(--text-secondary);
        }

        .add-btn {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 52px;
            font-family: 'Roboto', sans-serif;
        }

        .add-btn:active {
            transform: scale(0.95);
            background: var(--primary-dark);
        }

        .bulk-input-area {
            margin-top: 12px;
        }

        .bulk-textarea {
            width: 100%;
            min-height: 100px;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text);
            font-size: 14px;
            font-family: 'Roboto', sans-serif;
            outline: none;
            resize: vertical;
            line-height: 1.6;
        }

        .bulk-textarea:focus {
            border-color: var(--primary);
        }

        .bulk-textarea::placeholder {
            color: var(--text-secondary);
        }

        .bulk-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
        }

        .bulk-btn:active {
            transform: scale(0.98);
        }

        .extracted-section {
            margin-top: 16px;
            display: none;
        }

        .extracted-section.visible {
            display: block;
        }

        .extracted-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .extracted-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .clear-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            font-family: 'Roboto', sans-serif;
        }

        .extracted-list {
            max-height: 200px;
            overflow-y: auto;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 4px;
        }

        .extracted-item {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .extracted-item:active {
            background: rgba(60, 99, 242, 0.15);
        }

        .extracted-item .item-check {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .extracted-item.selected .item-check {
            background: var(--primary);
            border-color: var(--primary);
        }

        .extracted-item.selected .item-check::after {
            content: '✓';
            color: white;
            font-size: 12px;
            font-weight: 700;
        }

        .extracted-item .item-text {
            flex: 1;
            line-height: 1.4;
        }

        .extracted-item .item-reject {
            font-size: 11px;
            color: var(--text-secondary);
            padding: 3px 8px;
            border-radius: 6px;
            background: var(--bg-input);
        }

        .geocode-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #5B7DF7);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
            font-family: 'Roboto', sans-serif;
            box-shadow: 0 4px 20px rgba(60, 99, 242, 0.3);
        }

        .geocode-btn:active {
            transform: scale(0.98);
        }

        .geocode-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .address-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .address-card {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: slideIn 0.3s ease;
            border: 1px solid var(--border);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .address-marker {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 15px;
            flex-shrink: 0;
            box-shadow: 0 3px 10px rgba(60, 99, 242, 0.4);
        }

        .address-card:nth-child(2) .address-marker { background: #5B7DF7; }
        .address-card:nth-child(3) .address-marker { background: #7B5BF7; }
        .address-card:nth-child(4) .address-marker { background: #F75B9D; }
        .address-card:nth-child(5) .address-marker { background: var(--accent); }

        .address-info {
            flex: 1;
            min-width: 0;
        }

        .address-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 3px;
            word-break: break-word;
        }

        .address-coords {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .address-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .addr-action-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .addr-action-btn.delete:active {
            background: rgba(252, 63, 29, 0.2);
            color: var(--accent);
        }

        .addr-action-btn.locate {
            color: var(--primary);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            opacity: 0.3;
        }

        .empty-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
        }

        .empty-desc {
            font-size: 13px;
            line-height: 1.5;
        }

        .map-section {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            z-index: 998;
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .map-section.expanded {
            height: 60vh;
        }

        .map-toggle {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 20px;
            background: var(--bg-card);
            border-radius: 10px 10px 0 0;
            border: 1px solid var(--border);
            border-bottom: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .map-toggle-line {
            width: 24px;
            height: 3px;
            background: var(--text-secondary);
            border-radius: 2px;
        }

        .map-toggle svg {
            position: absolute;
            top: -32px;
            width: 24px;
            height: 24px;
            color: var(--text-secondary);
            transition: transform 0.3s;
        }

        .map-section.expanded .map-toggle svg {
            transform: rotate(180deg);
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .map-stats {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            gap: 6px;
            z-index: 999;
        }

        .stat-chip {
            padding: 6px 12px;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-chip .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
        }

        .map-zoom-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 999;
        }

        .map-zoom-btn button {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 10px;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .toast {
            position: fixed;
            bottom: 220px;
            left: 16px;
            right: 16px;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 13px;
            z-index: 10000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .toast.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--success);
        }

        .toast.error {
            border-color: var(--accent);
        }

        .geocoding-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spinAnim 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spinAnim {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .marker-popup {
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            padding: 4px;
        }

        @media (min-width: 768px) {
            body {
                max-width: 480px;
                margin: 0 auto;
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="app-logo">Э</div>
    <div>
        <div class="app-title">Энерджайзеры</div>
        <div class="app-subtitle">developer by fQzik</div>
    </div>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('scan')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        Скан
    </button>
    <button class="tab-btn" onclick="switchTab('manual')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Ввод
    </button>
    <button class="tab-btn" onclick="switchTab('list')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Список
    </button>
</div>

<div class="content-area">
    <div class="tab-content active" id="tab-scan">
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </div>
            <div class="upload-text">Загрузите скриншот</div>
            <div class="upload-hint">Список адресов будет распознан автоматически</div>
            <img class="upload-preview" id="uploadPreview" alt="preview">
            <button class="remove-image-btn" onclick="event.stopPropagation(); removeImage()">✕</button>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">

        <div class="ocr-progress" id="ocrProgress">
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
            <div class="progress-text" id="progressText">Распознавание текста...</div>
        </div>

        <div class="extracted-section" id="extractedSection">
            <div class="extracted-header">
                <span class="extracted-title">Распознанные адреса</span>
                <button class="clear-btn" onclick="clearExtracted()">Очистить</button>
            </div>
            <div class="extracted-list" id="extractedList"></div>
            <button class="geocode-btn" id="geocodeBtn" onclick="geocodeSelected()">Построить на карте</button>
        </div>
    </div>

    <div class="tab-content" id="tab-manual">
        <div class="manual-input-group">
            <input type="text" class="manual-input" id="manualInput" placeholder="Введите адрес..." onkeypress="if(event.key==='Enter') addManualAddress()">
            <button class="add-btn" onclick="addManualAddress()">+</button>
        </div>
        <div class="bulk-input-area">
            <div style="font-size:13px; color:var(--text-secondary); margin-bottom:8px; font-weight:600;">Массовый ввод (каждый адрес с новой строки):</div>
            <textarea class="bulk-textarea" id="bulkInput" placeholder="ул. Пушкина, д. 10&#10;пр. Ленина, д. 25, кв. 3&#10;бул. Шевченко, 7"></textarea>
            <button class="bulk-btn" onclick="addBulkAddresses()">Добавить все адреса</button>
        </div>
    </div>

    <div class="tab-content" id="tab-list">
        <div class="address-list" id="addressList">
            <div class="empty-state">
                <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <div class="empty-title">Нет адресов</div>
                <div class="empty-desc">Загрузите скриншот или введите адреса вручную, чтобы они появились на карте</div>
            </div>
        </div>
    </div>
</div>

<div class="map-section" id="mapSection">
    <div class="map-toggle" onclick="toggleMap()">
        <div class="map-toggle-line"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    <div class="map-stats">
        <div class="stat-chip"><span class="dot"></span> <span id="addrCount">0</span> адресов</div>
    </div>
    <div class="map-zoom-btn">
        <button onclick="mapZoomIn()">+</button>
        <button onclick="mapZoomOut()">−</button>
        <button onclick="fitAllMarkers()" title="Все точки">⊞</button>
    </div>
    <div id="map"></div>
</div>

<div class="toast" id="toast"></div>

<script>
    let addresses = [];
    let ymapMarkers = [];
    let extractedItems = [];
    let yandexMap = null;
    let selectedExtracted = new Set();
    let mapReady = false;

    const rejectKeywords = [
        '^адрес[:\\s]*$', '^адреса[:\\s]*$', '^адресов[:\\s]*$',
        '^адрес доставки[:\\s]*$', '^доставка[:\\s]*$', '^получатель[:\\s]*$',
        '^фио[:\\s]*$', '^телефон[:\\s]*$', '^тел[:\\s]*$',
        '^дата[:\\s]*$', '^время[:\\s]*$', '^заказ[:\\s]*$',
        '^номер[:\\s]*$', '^№[:\\s]*$', '^номер заказа[:\\s]*$',
        '^откуда[:\\s]*$', '^отправитель[:\\s]*$', '^кому[:\\s]*$',
        '^от[:\\s]*$', '^по[:\\s]*$', '^через[:\\s]*$',
        '^итого[:\\s]*$', '^всего[:\\s]*$', '^сумма[:\\s]*$',
        '^оплата[:\\s]*$', '^наложенный[:\\s]*$', '^наложенный платеж[:\\s]*$',
        '^комментарий[:\\s]*$', '^примечание[:\\s]*$', '^заметка[:\\s]*$',
        '^список[:\\s]*$', '^доставка[:\\s]*$', '^курьер[:\\s]*$',
        '^пункт[:\\s]*$', '^пвз[:\\s]*$', '^пункт выдачи[:\\s]*$',
        '^склад[:\\s]*$', '^магазин[:\\s]*$', '^офис[:\\s]*$',
        '^компания[:\\s]*$', '^организация[:\\s]*$', '^предприятие[:\\s]*$',
        '^www\\.', '^http', '^https', 'com$', 'ru$', '^$',
        '^[а-яё]{1,4}$', '^[a-z]{1,4}$', '^[0-9]{1,2}$',
        '^\\+$', '^\\-+$', '^=+$', '^\\*+$', '^\\d+$',
        '^\\d+\\s*шт$', '^\\d+\\s*руб$', '^\\d+\\s*грн$', '^\\d+\\s*тг$',
        '^только\\s', '^не\\s', '^без\\s',
        'скриншот', 'картинка', 'фото', 'изображение',
        'энерджайзеры', 'developer', 'fqzik'
    ];

    const addressKeywords = [
        'ул\\.', 'улица', 'пр\\.', 'проспект', 'пер\\.', 'переулок',
        'бул\\.', 'бульвар', 'ш\\.', 'шоссе', 'наб\\.', 'набережная',
        'д\\.', 'дом', 'кв\\.', 'квартира', 'офис', 'оф\\.',
        'корп\\.', 'корпус', 'стр\\.', 'строение', 'лит\\.',
        'мкр\\.', 'микрорайон', 'пос\\.', 'посёлок', 'г\\.', 'город',
        'р-н', 'район', 'пл\\.', 'площадь',
        'пр-т', 'пр-кт', 'ш', 'ул', 'бул', 'наб', 'д', 'кв',
        'корп', 'лит', 'оф', 'стр', 'мкр', 'р-н',
        'индекс', 'почт', '\\d{5,6}'
    ];

    function isLikelyAddress(text) {
        const trimmed = text.trim();
        if (trimmed.length < 4) return false;

        for (const pattern of rejectKeywords) {
            try {
                if (new RegExp(pattern, 'i').test(trimmed)) return false;
            } catch(e) {}
        }

        for (const kw of addressKeywords) {
            try {
                if (new RegExp(kw, 'i').test(trimmed)) return true;
            } catch(e) {}
        }

        if (/[уулцпбшнкмдс]\.?\s*\w+/i.test(trimmed)) return true;
        if (/\d+\s*[\-–—]\s*\d/.test(trimmed) && /\w/.test(trimmed)) return true;

        return false;
    }

    ymaps.ready(function() {
        yandexMap = new ymaps.Map('map', {
            center: [55.7558, 37.6173],
            zoom: 10
        }, {
            suppressMapOpenBlock: true
        });
        
        mapReady = true;
        console.log('Yandex Map initialized successfully');
        
        // Re-render markers if addresses were added before map was ready
        if (addresses.length > 0) {
            updateMarkers();
        }
    });

    function getMarkerPreset(index) {
        const presets = [
            'islands#blueCircleIcon',
            'islands#darkBlueCircleIcon',
            'islands#violetCircleIcon',
            'islands#pinkCircleIcon',
            'islands#redCircleIcon',
            'islands#greenCircleIcon',
            'islands#orangeCircleIcon',
            'islands#purpleCircleIcon',
            'islands#lightBlueCircleIcon',
            'islands#yellowCircleIcon'
        ];
        return presets[(index - 1) % presets.length];
    }

    function addMarkerToMap(addr, index) {
        if (!addr.lat || !addr.lng || !yandexMap) {
            console.warn('Cannot add marker: missing data', addr, index);
            return;
        }

        try {
            const marker = new ymaps.Placemark(
                [addr.lat, addr.lng],
                {
                    iconContent: String(index),
                    balloonContentHeader: 'Адрес #' + index,
                    balloonContentBody: addr.text,
                    hintContent: addr.text
                },
                {
                    preset: getMarkerPreset(index)
                }
            );

            yandexMap.geoObjects.add(marker);
            ymapMarkers.push(marker);
            console.log('Marker added:', index, addr.text);
        } catch (e) {
            console.error('Error adding marker:', e);
        }
    }

    function updateMarkers() {
        if (!yandexMap) {
            console.warn('Map not ready yet, waiting...');
            setTimeout(updateMarkers, 500);
            return;
        }

        // Clear all existing markers
        yandexMap.geoObjects.removeAll();
        ymapMarkers = [];

        // Add all markers
        addresses.forEach((addr, i) => {
            addMarkerToMap(addr, i + 1);
        });

        document.getElementById('addrCount').textContent = addresses.length;
        updateAddressList();
    }

    function fitAllMarkers() {
        if (!yandexMap || ymapMarkers.length === 0) return;
        
        const bounds = yandexMap.geoObjects.getBounds();
        if (bounds) {
            yandexMap.setBounds(bounds, {
                checkZoomRange: true,
                zoomMargin: 50
            });
        }
    }

    function mapZoomIn() {
        if (!yandexMap) return;
        const currentZoom = yandexMap.getZoom();
        yandexMap.setZoom(currentZoom + 1, { duration: 200 });
    }

    function mapZoomOut() {
        if (!yandexMap) return;
        const currentZoom = yandexMap.getZoom();
        yandexMap.setZoom(currentZoom - 1, { duration: 200 });
    }

    function updateAddressList() {
        const container = document.getElementById('addressList');

        if (addresses.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    <div class="empty-title">Нет адресов</div>
                    <div class="empty-desc">Загрузите скриншот или введите адреса вручную</div>
                </div>
            `;
            return;
        }

        container.innerHTML = addresses.map((addr, i) => `
            <div class="address-card">
                <div class="address-marker">${i + 1}</div>
                <div class="address-info">
                    <div class="address-name">${addr.text}</div>
                    <div class="address-coords">${addr.lat.toFixed(4)}, ${addr.lng.toFixed(4)}</div>
                </div>
                <div class="address-actions">
                    <button class="addr-action-btn locate" onclick="locateAddress(${i})">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 2v4m0 12v4m-10-10h4m12 0h4"/>
                        </svg>
                    </button>
                    <button class="addr-action-btn delete" onclick="deleteAddress(${i})">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
            </div>
        `).join('');
    }

    function locateAddress(idx) {
        const addr = addresses[idx];
        if (!addr.lat || !addr.lng || !yandexMap) return;

        yandexMap.setCenter([addr.lat, addr.lng], 16, { duration: 300 });
        
        if (ymapMarkers[idx]) {
            setTimeout(() => {
                ymapMarkers[idx].balloon.open();
            }, 350);
        }

        const mapSection = document.getElementById('mapSection');
        if (!mapSection.classList.contains('expanded')) {
            mapSection.classList.add('expanded');
        }
    }

    function deleteAddress(idx) {
        addresses.splice(idx, 1);
        updateMarkers();
        showToast('Адрес удалён');
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

        const btns = document.querySelectorAll('.tab-btn');
        const idxMap = { 'scan': 0, 'manual': 1, 'list': 2 };
        btns[idxMap[tab]].classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');

        if (tab === 'list' && yandexMap) {
            setTimeout(() => yandexMap.container.fitToViewport(), 100);
        }
    }

    function handleImageUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('uploadPreview').src = e.target.result;
            document.getElementById('uploadZone').classList.add('has-image');
            runOCR(e.target.result);
        };
        reader.readAsDataURL(file);
    }

    function removeImage() {
        document.getElementById('uploadPreview').src = '';
        document.getElementById('uploadZone').classList.remove('has-image');
        document.getElementById('fileInput').value = '';
        document.getElementById('ocrProgress').classList.remove('visible');
        document.getElementById('extractedSection').classList.remove('visible');
        extractedItems = [];
        selectedExtracted.clear();
    }

    async function runOCR(imageData) {
        const progressEl = document.getElementById('ocrProgress');
        const fillEl = document.getElementById('progressFill');
        const textEl = document.getElementById('progressText');

        progressEl.classList.add('visible');

        try {
            const result = await Tesseract.recognize(imageData, 'rus+eng', {
                logger: (m) => {
                    if (m.status === 'recognizing text') {
                        const pct = Math.round(m.progress * 100);
                        fillEl.style.width = pct + '%';
                        textEl.textContent = `Распознавание... ${pct}%`;
                    } else if (m.status === 'loading language traineddata') {
                        const pct = Math.round(m.progress * 100);
                        fillEl.style.width = pct + '%';
                        textEl.textContent = `Загрузка языковой модели... ${pct}%`;
                    } else {
                        textEl.textContent = m.status || 'Обработка...';
                    }
                }
            });

            textEl.textContent = 'Готово!';
            fillEl.style.width = '100%';
            processExtractedText(result.data.text);

            setTimeout(() => { progressEl.classList.remove('visible'); }, 1500);
        } catch (err) {
            console.error('OCR Error:', err);
            textEl.textContent = 'Ошибка распознавания';
            fillEl.style.width = '0%';
            showToast('Ошибка распознавания текста', 'error');
        }
    }

    function processExtractedText(text) {
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        extractedItems = [];

        lines.forEach((line, i) => {
            if (extractedItems.some(item => item.text.toLowerCase() === line.toLowerCase())) return;
            const isAddress = isLikelyAddress(line);
            extractedItems.push({ text: line, isAddress, id: i });
        });

        extractedItems.forEach(item => {
            if (item.isAddress) selectedExtracted.add(item.id);
        });

        renderExtractedList();
        document.getElementById('extractedSection').classList.add('visible');
    }

    function renderExtractedList() {
        const container = document.getElementById('extractedList');
        container.innerHTML = extractedItems.map(item => {
            const isSelected = selectedExtracted.has(item.id);
            const isRejected = !item.isAddress && !isSelected;
            return `
                <div class="extracted-item ${isSelected ? 'selected' : ''}" onclick="toggleExtracted(${item.id})">
                    <div class="item-check"></div>
                    <div class="item-text">${item.text}</div>
                    ${isRejected ? '<span class="item-reject">пропущен</span>' : ''}
                </div>
            `;
        }).join('');
    }

    function toggleExtracted(id) {
        if (selectedExtracted.has(id)) {
            selectedExtracted.delete(id);
        } else {
            selectedExtracted.add(id);
        }
        renderExtractedList();
    }

    function clearExtracted() {
        selectedExtracted.clear();
        extractedItems = [];
        document.getElementById('extractedSection').classList.remove('visible');
        removeImage();
    }

    function cleanAddressForSearch(rawAddress) {
        let addr = rawAddress.trim();
        
        // Replace common OCR errors
        addr = addr.replace(/[|ІІ]/g, 'l');
        addr = addr.replace(/\s+/g, ' ').trim();
        addr = addr.replace(/^[\s\-\*\.\#\>\|]*/, '');
        addr = addr.replace(/[\s\-\*\.\#\>\|]*$/, '');
        
        // Normalize address abbreviations
        addr = addr.replace(/ул\s/gi, 'ул. ');
        addr = addr.replace(/пр\s/gi, 'пр. ');
        addr = addr.replace(/пер\s/gi, 'пер. ');
        addr = addr.replace(/бул\s/gi, 'бул. ');
        addr = addr.replace(/д\s/gi, 'д. ');
        addr = addr.replace(/кв\s/gi, 'кв. ');
        addr = addr.replace(/корп\s/gi, 'корп. ');
        addr = addr.replace(/стр\s/gi, 'стр. ');
        
        return addr;
    }

    async function geocodeSelected() {
        const btn = document.getElementById('geocodeBtn');
        const selectedItems = extractedItems.filter(item => selectedExtracted.has(item.id));

        if (selectedItems.length === 0) {
            showToast('Выберите хотя бы один адрес', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="geocoding-spinner"></span> Поиск адресов в Москве...';

        let geocoded = 0;
        let failed = 0;

        for (const item of selectedItems) {
            try {
                const coords = await geocodeAddress(item.text);
                if (coords) {
                    addresses.push({ text: item.text, lat: coords.lat, lng: coords.lng });
                    geocoded++;
                } else {
                    failed++;
                }
            } catch (e) {
                console.error('Geocode error for:', item.text, e);
                failed++;
            }
            await sleep(1200);
        }

        btn.disabled = false;
        btn.innerHTML = 'Построить на карте';

        if (geocoded > 0) {
            updateMarkers();
            if (addresses.length === geocoded) {
                setTimeout(() => fitAllMarkers(), 300);
            }

            const btns = document.querySelectorAll('.tab-btn');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btns[2].classList.add('active');
            document.getElementById('tab-list').classList.add('active');

            showToast(`Найдено: ${geocoded} адресов` + (failed > 0 ? `, не найдено: ${failed}` : ''), failed > 0 ? '' : 'success');
        } else {
            showToast('Ни один адрес не удалось найти в Москве', 'error');
        }
    }

    async function geocodeAddress(rawAddress) {
        const cleaned = cleanAddressForSearch(rawAddress);
        
        const queries = [];
        
        // Multiple query variations for better matching
        queries.push(`Москва, ${cleaned}`);
        queries.push(cleaned);
        queries.push(`Москва ${cleaned}`);
        queries.push(`г. Москва, ${cleaned}`);
        
        // Extract street part if possible
        const streetMatch = cleaned.match(/(?:ул|пр|пер|бул|ш|наб|пл|пр-т|пр-кт)\.?\s+[^,\n]+/i);
        if (streetMatch) {
            queries.push(`Москва, ${streetMatch[0]}`);
        }
        
        for (const query of queries) {
            try {
                const result = await ymaps.geocode(query, {
                    results: 3,
                    boundedBy: [[55.14, 36.89], [56.02, 37.96]],
                    strictBounds: false
                });
                
                const firstResult = result.geoObjects.get(0);
                if (firstResult) {
                    const coords = firstResult.geometry.getCoordinates();
                    const lat = coords[0];
                    const lng = coords[1];
                    
                    // Verify within Moscow bounds
                    if (lat >= 55.3 && lat <= 56.1 && lng >= 37.0 && lng <= 38.1) {
                        console.log('Found address:', query, '->', lat, lng);
                        return { lat, lng };
                    }
                }
            } catch (e) {
                console.warn('Yandex geocode failed for:', query, e);
            }
            
            await sleep(500);
        }
        
        console.log('No result found for:', rawAddress);
        return null;
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function addManualAddress() {
        const input = document.getElementById('manualInput');
        const text = input.value.trim();

        if (!text) {
            showToast('Введите адрес', 'error');
            return;
        }

        input.value = '';
        showToast('Поиск адреса в Москве...');

        const coords = await geocodeAddress(text);

        if (coords) {
            addresses.push({ text, lat: coords.lat, lng: coords.lng });
            updateMarkers();
            setTimeout(() => fitAllMarkers(), 300);
            showToast('Адрес добавлен ✓', 'success');
        } else {
            showToast('Адрес не найден в Москве', 'error');
        }
    }

    async function addBulkAddresses() {
        const textarea = document.getElementById('bulkInput');
        const text = textarea.value.trim();

        if (!text) {
            showToast('Введите адреса', 'error');
            return;
        }

        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 2);

        if (lines.length === 0) {
            showToast('Нет адресов для добавления', 'error');
            return;
        }

        showToast(`Поиск ${lines.length} адресов в Москве...`);

        let geocoded = 0;
        let failed = 0;

        for (const line of lines) {
            const coords = await geocodeAddress(line);
            if (coords) {
                addresses.push({ text: line, lat: coords.lat, lng: coords.lng });
                geocoded++;
            } else {
                failed++;
            }
            await sleep(1200);
        }

        updateMarkers();
        if (geocoded > 0) setTimeout(() => fitAllMarkers(), 300);
        textarea.value = '';

        showToast(
            `Добавлено: ${geocoded}` + (failed > 0 ? `, не найдено: ${failed}` : ''),
            failed === 0 ? 'success' : ''
        );
    }

    function toggleMap() {
        const section = document.getElementById('mapSection');
        section.classList.toggle('expanded');
        setTimeout(() => {
            if (yandexMap) yandexMap.container.fitToViewport();
        }, 450);
    }

    function showToast(message, type = '') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast visible' + (type ? ' ' + type : '');

        clearTimeout(window._toastTimeout);
        window._toastTimeout = setTimeout(() => {
            toast.classList.remove('visible');
        }, 3000);
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
        console.log('Page loaded, waiting for Yandex Maps API...');
    });
</script>

</body>
</html>
